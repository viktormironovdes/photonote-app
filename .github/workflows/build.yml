name: Build PhotoNote APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Create Capacitor project
      run: |
        echo '{
          "name": "PhotoNote",
          "version": "1.0.0",
          "scripts": {
            "build": "echo \"Building PhotoNote...\""
          },
          "dependencies": {
            "@capacitor/filesystem": "^6.0.0"
          },
          "devDependencies": {
            "@capacitor/cli": "^6.0.0",
            "@capacitor/android": "^6.0.0"
          }
        }' > package.json

    - name: Install dependencies
      run: npm install

    - name: Create www folder and copy ALL files
      run: |
        mkdir -p www
        mkdir -p www/css
        mkdir -p www/js
        mkdir -p www/icons
        
        # Копируем все HTML файлы
        cp index.html www/
        cp manifest.json www/
        cp sw.js www/
        
        # Копируем CSS
        cp css/style.css www/css/
        
        # Копируем все JS файлы
        cp js/*.js www/js/
        
        # Копируем иконки
        cp icons/*.png www/icons/ 2>/dev/null || true
        
        echo "✅ All files copied to www!"
        ls -la www/
        ls -la www/js/

    - name: Initialize Capacitor and add Android
      run: |
        npx cap init "PhotoNote" "com.phonote.app" --web-dir www
        npx cap add android
        npx cap update
        npx cap sync

    - name: Setup app icons
      run: |
        echo "🎨 Setting up app icons..."
        
        mkdir -p android/app/src/main/res/mipmap-mdpi
        mkdir -p android/app/src/main/res/mipmap-hdpi
        mkdir -p android/app/src/main/res/mipmap-xhdpi
        mkdir -p android/app/src/main/res/mipmap-xxhdpi
        mkdir -p android/app/src/main/res/mipmap-xxxhdpi
        
        # Проверяем наличие иконок в разных возможных местах
        if [ -f "www/icons/icon-192.png" ]; then
          echo "✅ Found icons in www/icons/"
          cp www/icons/icon-48.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png 2>/dev/null || true
          cp www/icons/icon-72.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png 2>/dev/null || true
          cp www/icons/icon-96.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png 2>/dev/null || true
          cp www/icons/icon-144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png 2>/dev/null || true
          cp www/icons/icon-192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png 2>/dev/null || true
        elif [ -f "icons/icon-192.png" ]; then
          echo "✅ Found icons in icons/"
          cp icons/icon-48.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png 2>/dev/null || true
          cp icons/icon-72.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png 2>/dev/null || true
          cp icons/icon-96.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png 2>/dev/null || true
          cp icons/icon-144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png 2>/dev/null || true
          cp icons/icon-192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png 2>/dev/null || true
        else
          echo "⚠️ Icons not found, using Capacitor defaults"
        fi

    - name: Build debug APK
      run: |
        cd android
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Create keystore
      run: |
        keytool -genkey -v \
          -keystore phonote.keystore \
          -alias phonote \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass phonote123 \
          -keypass phonote123 \
          -dname "CN=PhotoNote, OU=App, O=PhotoNote, L=City, S=State, C=US"

    - name: Install apksigner
      run: |
        sudo apt-get update
        sudo apt-get install -y apksigner

    - name: Sign the APK
      run: |
        apksigner sign \
          --ks phonote.keystore \
          --ks-pass pass:phonote123 \
          --key-pass pass:phonote123 \
          android/app/build/outputs/apk/debug/app-debug.apk
        
        mkdir -p android/app/build/outputs/apk/release/
        cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/release/app-release.apk
        
        echo "✅ APK signed successfully!"

    - name: Verify APK signature
      run: |
        apksigner verify android/app/build/outputs/apk/release/app-release.apk
        echo "✅ APK signature verified!"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: phonote-apk
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 7
