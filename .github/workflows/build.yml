name: Build PhotoNote APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Create Capacitor project
      run: |
        echo '{
          "name": "PhotoNote",
          "version": "1.0.0",
          "scripts": {
            "build": "echo \"Building PhotoNote...\""
          },
          "devDependencies": {
            "@capacitor/cli": "^6.0.0",
            "@capacitor/android": "^6.0.0"
          }
        }' > package.json

    - name: Install dependencies
      run: npm install

    - name: Create capacitor.config.json
      run: |
        cat > capacitor.config.json << 'EOF'
        {
          "appId": "com.phonote.app",
          "appName": "PhotoNote",
          "webDir": "www",
          "bundledWebRuntime": false,
          "android": {
            "icon": "assets/icons/icon-192.png"
          }
        }
        EOF
        echo "✅ capacitor.config.json created"

    - name: Copy web assets
      run: |
        mkdir -p www
        cp -r assets/* www/
        echo "✅ All files copied to www!"
        echo "📁 Содержимое www:"
        ls -la www/

    - name: Initialize Capacitor and add Android
      run: |
        npx cap init "PhotoNote" "com.phonote.app" --web-dir www
        npx cap add android
        npx cap sync

    - name: Setup app icons (copy to Android res)
      run: |
        echo "🎨 Setting up app icons..."
        
        mkdir -p android/app/src/main/res/mipmap-mdpi
        mkdir -p android/app/src/main/res/mipmap-hdpi
        mkdir -p android/app/src/main/res/mipmap-xhdpi
        mkdir -p android/app/src/main/res/mipmap-xxhdpi
        mkdir -p android/app/src/main/res/mipmap-xxxhdpi
        
        ICON_PATH="assets/icons"
        
        if [ -d "$ICON_PATH" ]; then
          echo "📂 Found icons in: $ICON_PATH"
          
          # Копируем иконки
          [ -f "$ICON_PATH/icon-48.png" ] && cp "$ICON_PATH/icon-48.png" android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          [ -f "$ICON_PATH/icon-72.png" ] && cp "$ICON_PATH/icon-72.png" android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          [ -f "$ICON_PATH/icon-96.png" ] && cp "$ICON_PATH/icon-96.png" android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          [ -f "$ICON_PATH/icon-144.png" ] && cp "$ICON_PATH/icon-144.png" android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          [ -f "$ICON_PATH/icon-192.png" ] && cp "$ICON_PATH/icon-192.png" android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          
          # round иконки
          [ -f "$ICON_PATH/icon-48.png" ] && cp "$ICON_PATH/icon-48.png" android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          [ -f "$ICON_PATH/icon-72.png" ] && cp "$ICON_PATH/icon-72.png" android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          [ -f "$ICON_PATH/icon-96.png" ] && cp "$ICON_PATH/icon-96.png" android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          [ -f "$ICON_PATH/icon-144.png" ] && cp "$ICON_PATH/icon-144.png" android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          [ -f "$ICON_PATH/icon-192.png" ] && cp "$ICON_PATH/icon-192.png" android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          
          echo "✅ Icons installed!"
        else
          echo "⚠️ Icon folder not found at $ICON_PATH"
          echo "📂 Поиск иконок в других местах:"
          find . -name "icon-*.png" 2>/dev/null
        fi

    - name: Build debug APK
      run: |
        cd android
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Create keystore
      run: |
        keytool -genkey -v \
          -keystore phonote.keystore \
          -alias phonote \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass phonote123 \
          -keypass phonote123 \
          -dname "CN=PhotoNote, OU=App, O=PhotoNote, L=City, S=State, C=US"

    - name: Install apksigner
      run: |
        sudo apt-get update
        sudo apt-get install -y apksigner

    - name: Sign the APK
      run: |
        apksigner sign \
          --ks phonote.keystore \
          --ks-pass pass:phonote123 \
          --key-pass pass:phonote123 \
          android/app/build/outputs/apk/debug/app-debug.apk
        
        mkdir -p android/app/build/outputs/apk/release/
        cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/release/app-release.apk
        
        echo "✅ APK signed successfully!"

    - name: Verify APK signature
      run: |
        apksigner verify android/app/build/outputs/apk/release/app-release.apk
        echo "✅ APK signature verified!"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: phonote-apk
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 7
